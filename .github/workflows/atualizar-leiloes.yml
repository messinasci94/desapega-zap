name: Atualizar Leilões Ativos

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Buscar leilões ativos
        run: node buscar-leiloes.js
        env:
          WIDGET_URL: ${{ secrets.WIDGET_URL }}

      - name: Commit e push do JSON
        run: |
          git config user.name "O Leiloeiro Bot"
          git config user.email "bot@desapegazap.com.br"
          git add leiloes-ativos.json
          git diff --staged --quiet || (git commit -m "[bot] Atualiza leilões ativos - $(date '+%d/%m %H:%M')" && git pull --rebase && git push)
